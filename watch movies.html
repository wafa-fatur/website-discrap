<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situs Film Menarik</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000, #141414, #1a1a1a);
            background-attachment: fixed;
            color: #FFFFFF;
            overflow-x: hidden;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        header {
            background: linear-gradient(90deg, #E50914, #000000);
            padding: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.05)"/></svg>') repeat;
            opacity: 0.2;
        }
        header h1 {
            margin: 0;
            font-size: 2em;
            text-shadow: 0 0 15px #E50914, 0 0 30px #000000;
            position: relative;
            z-index: 1;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 15px;
            position: relative;
            z-index: 1;
        }
        nav a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 5px;
        }
        nav a:hover {
            background: rgba(229, 9, 20, 0.3);
            box-shadow: 0 0 8px #E50914;
            transform: scale(1.05);
        }
        .profile-icon {
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        .profile-icon:hover {
            transform: scale(1.1);
            color: #E50914;
        }
        .search-filter {
            margin: 20px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        }
        .search-filter input, .search-filter select {
            padding: 10px;
            margin: 0 8px;
            border: none;
            border-radius: 20px;
            font-size: 0.95em;
            background: #333333;
            color: #FFFFFF;
            transition: box-shadow 0.3s;
        }
        .search-filter input:focus, .search-filter select:focus {
            outline: none;
            box-shadow: 0 0 8px #E50914;
        }
        .search-filter button {
            padding: 10px 20px;
            background: #E50914;
            color: #FFFFFF;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }
        .search-filter button:hover {
            background: #B20710;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5);
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .tab-button {
            padding: 10px 20px;
            background: #333333;
            color: #FFFFFF;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab-button.active {
            background: #E50914;
            box-shadow: 0 0 10px #E50914;
        }
        .tab-button:hover {
            background: #B20710;
            transform: translateY(-1px);
        }
        main {
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .back-button {
            text-align: center;
            margin-bottom: 15px;
        }
        .back-button button {
            padding: 8px 18px;
            background: #E50914;
            color: #FFFFFF;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .back-button button:hover {
            background: #B20710;
            transform: translateY(-1px);
        }
        section {
            margin-bottom: 30px;
        }
        h2 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 12px #E50914;
            animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .movie-row {
display: flex;
flex-direction: row;
overflow-x: auto;
gap: 20px;
padding: 10px 5px;
scroll-behavior: smooth;
}

.movie {
flex: 0 0 200px;
}

.movie-row::-webkit-scrollbar-thumb {
background: #E50914;
border-radius: 10px;
}

.movie {
min-width: 220px;
flex: 0 0 auto;
}
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            animation: fadeIn 0.8s ease-in;
        }
        .movie {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.1));
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .movie::before {
            content: '🎥';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.3em;
            opacity: 0.7;
        }
        .movie:hover {
            transform: scale(1.05) rotate(0.5deg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9), 0 0 15px #E50914;
        }
        .movie img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .movie:hover img {
            transform: scale(1.03);
        }
        .movie h3 {
            margin: 12px 0;
            font-size: 1.2em;
            color: #E50914;
        }
        .movie p {
            font-size: 0.9em;
            color: #CCCCCC;
            margin-bottom: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            padding: 25px;
            border-radius: 15px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.9);
        }
        .modal-content img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 12px;
        }
        .modal-content button {
            margin: 12px 8px;
            padding: 10px 20px;
            background: #E50914;
            color: #FFFFFF;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .modal-content button:hover {
            background: #B20710;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5);
        }
        .close {
            color: #CCCCCC;
            float: right;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close:hover {
            color: #FFFFFF;
        }
        .profile-modal .modal-content {
            max-width: 320px;
            padding: 18px;
            font-size: 0.9em;
        }
        .profile-modal input {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: none;
            border-radius: 5px;
            background: #333333;
            color: #FFFFFF;
            font-size: 0.9em;
        }
        .profile-modal label {
            display: block;
            margin-top: 8px;
            font-size: 0.95em;
            color: #CCCCCC;
        }
        .profile-modal button {
            margin-top: 12px;
            padding: 8px 18px;
            background: #E50914;
            color: #FFFFFF;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .profile-modal button:hover {
            background: #B20710;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5);
        }
        footer {
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, #000000, #141414);
            margin-top: 30px;
            box-shadow: 0 -3px 12px rgba(0, 0, 0, 0.8);
            animation: fadeIn 1s ease-in;
        }
        footer p {
            margin: 0;
            font-size: 1em;
            text-shadow: 0 0 8px #E50914;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
                padding: 12px;
            }
            header h1 {
                font-size: 1.8em;
                margin-bottom: 8px;
            }
            nav ul {
                flex-direction: row;
                justify-content: center;
                gap: 15px;
            }
            .profile-icon {
                position: absolute;
                top: 8px;
                right: 8px;
            }
            .tabs {
                flex-direction: row;
                gap: 5px;
            }
            .movie-grid {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 15px;
            }
            .search-filter {
                padding: 12px;
            }
            .search-filter input, .search-filter select {
                margin: 4px;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎬 Nightflix </h1>
        <nav>
            <ul>
                <li><a href="#" onclick="showHome()">🏠 Beranda</a></li>
                <li><a href="#" onclick="showWatchlist()">📋 Watchlist</a></li>
                <li><a href="#" onclick="showHistory()">📜 Riwayat</a></li>
            </ul>
        </nav>
        <div class="profile-icon" onclick="openProfileModal()">👤</div>
    </header>
    <div class="search-filter">
        <input type="text" id="search-input" placeholder="🔍 Cari film...">
        <select id="genre-select">
            <option value="">🎭 Semua Genre</option>
            <!-- Genres akan dimuat di sini -->
        </select>
        <button onclick="searchMovies()">Cari</button>
    </div>
    <main id="home">

<section>
<h2>Romance</h2>
<div class="movie-row" id="romance-list"></div>
</section>

<section>
<h2>Action</h2>
<div class="movie-row" id="action-list"></div>
</section>

<section>
<h2>Sci-Fi</h2>
<div class="movie-row" id="scifi-list"></div>
</section>

</main>
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modal-poster" src="" alt="">
            <h2 id="modal-title"></h2>
            <p id="modal-overview"></p>
            <p><strong>⭐ Rating:</strong> <span id="modal-rating"></span>/10</p>
            <p><strong>📅 Tanggal Rilis:</strong> <span id="modal-release"></span></p>
            <button onclick="watchMovie()">▶️ Tonton Trailer</button>
            <button onclick="addToWatchlist()">➕ Tambah ke Watchlist</button>
            <button onclick="addToHistory()">✅ Tandai Ditonton</button>
        </div>
    </div>
    <div id="profile-modal" class="modal profile-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>👤 Profil Pengguna</h2>
            <label for="profile-name">Nama:</label>
            <input type="text" id="profile-name" placeholder="Masukkan nama">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" placeholder="Masukkan email">
            <button onclick="saveProfile()">💾 Simpan</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Situs Film Saya. Pastikan konten legal! 🎉</p>
    </footer>
    <script>

const moviesByGenre = {

romance: [
{
title: "Titanic",
overview: "Cinta di kapal yang sayangnya nabrak es.",
rating: 7.9,
release: "1997",
poster: "https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg"
},
{
title: "La La Land",
overview: "Kisah cinta musisi dan aktris yang mengejar mimpi.",
rating: 8.0,
release: "2016",
poster: "https://image.tmdb.org/t/p/w500/uDO8zWDhfWwoFdKS4fzkUJt0Rf0.jpg"
}
],

action: [
{
title: "Mad Max Fury Road",
overview: "Kejar-kejaran brutal di gurun.",
rating: 8.1,
release: "2015",
poster: "https://image.tmdb.org/t/p/w500/8tZYtuWezp8JbcsvHYO0O46tFbo.jpg"
},
{
title: "John Wick",
overview: "Anjing mati = semua musuh mati.",
rating: 7.4,
release: "2014",
poster: "https://image.tmdb.org/t/p/w500/fZPSd91yGE9fCcCe6OoQr6E3Bev.jpg"
}
],

scifi: [
{
title: "Interstellar",
overview: "Nyari planet baru demi umat manusia.",
rating: 8.6,
release: "2014",
poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg"
},
{
title: "Inception",
overview: "Mimpi di dalam mimpi di dalam mimpi.",
rating: 8.8,
release: "2010",
poster: "https://image.tmdb.org/t/p/w500/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg"
}
]

};


function renderRow(listId, movies){

const container = document.getElementById(listId);

container.innerHTML = movies.map(movie => `
<div class="movie" onclick="openMovie('${movie.title}','${movie.overview}','${movie.rating}','${movie.release}','${movie.poster}')">

<img src="${movie.poster}">

<h3>${movie.title}</h3>

</div>
`).join("");

}


renderRow("romance-list", moviesByGenre.romance);
renderRow("action-list", moviesByGenre.action);
renderRow("scifi-list", moviesByGenre.scifi);


function openMovie(title, overview, rating, release, poster){

document.getElementById("modal-title").innerText = title;
document.getElementById("modal-overview").innerText = overview;
document.getElementById("modal-rating").innerText = rating;
document.getElementById("modal-release").innerText = release;
document.getElementById("modal-poster").src = poster;

document.getElementById("movie-modal").style.display = "flex";

}

function closeModal(){
document.getElementById("movie-modal").style.display = "none";
}

</script>
</body>
</html>
